<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Opening Dojo</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body style="background: #e8f5e9;">

<div class="main-wrapper">
    <div class="sidebar-left">
        <a href="/" class="magical-button secondary"><i class="fas fa-arrow-left"></i> Back to Game</a>

        <div class="frog-container" style="border-color: #4caf50;">
            <img src="{{ url_for('static', filename='img/wizard_frog.png') }}" alt="Frog" class="frog-img">
        </div>
        <div class="dialogue-bubble" id="dojoFrog">
            Ribbit! Welcome to the Dojo.
        </div>

        <div style="margin-bottom: 15px; border-top:1px solid #ccc; padding-top:10px;">
            <input type="text" id="newOpeningName" placeholder="e.g. Bird's Opening" style="width:100%; padding:5px; margin-bottom:5px;">
            <button id="btnLearn" class="small-btn blue" style="width:100%;">+ Ask Frog to Learn</button>
        </div>

        <div class="dojo-list" id="openingButtons" style="overflow-y:auto; max-height:400px;">
        </div>
    </div>

    <div class="board-container">
        <h2>🥋 Opening Practice</h2>
        <div id="dojoBoard" style="width: 550px"></div>
        <div id="statusMessage">Select an opening to begin.</div>
    </div>

    <div class="sidebar-right">

        <div id="strategyPanel" class="analysis-content" style="display:none; border-color: #4caf50;">
            <div style="background: #e8f5e9; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px dashed #2E8B57;">
                <h4 style="margin-top:0; color:#2E8B57; margin-bottom: 5px;">📜 Target Line</h4>
                <div id="pgnDisplay" style="font-family: monospace; font-weight: bold; color: #333;"></div>
            </div>

            <h4 style="margin-top:0; color:#d84315;">💡 Key Ideas</h4>
            <ul id="ideaList" style="padding-left:20px; font-size:0.9em;"></ul>

            <h4 style="margin-top:10px; color:#c62828;">⚔️ Thematic Tactics</h4>
            <ul id="tacticList" style="padding-left:20px; font-size:0.9em;"></ul>
        </div>

        <h3>Moves</h3>
        <div class="move-list-container">
            <table id="moveTable">
                <thead><tr><th>#</th><th>White</th><th>Black</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    var game = new Chess();
    var board = Chessboard('dojoBoard', {
        draggable: true,
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        onDragStart: function(source, piece) {
            // Only prevent moving if the game is over
            if (game.game_over()) return false;
            // Allow moving both colors in the Dojo
            return true;
        },
        onDrop: function(source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) {
                if (typeof SoundFX !== 'undefined') SoundFX.error();
                if (typeof setFrogMood !== 'undefined') setFrogMood('mad');
                return 'snapback';
            }

            if (typeof SoundFX !== 'undefined') {
                if (move.captured) SoundFX.capture();
                else SoundFX.move();
            }

            updateTable();

            $.ajax({
                url: '/move',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ move: move.from + move.to + (move.promotion ? move.promotion : '') }),
                success: function(res) {
                    if (res.error) {
                        game.undo();
                        board.position(game.fen());
                        updateTable();
                        $('#dojoFrog').text(res.message);
                        if (typeof SoundFX !== 'undefined') SoundFX.error();
                        if (typeof setFrogMood !== 'undefined') setFrogMood('mad');
                        return;
                    }
                    if (res.engine_move) {
                        var m = res.engine_move;
                        game.move({ from: m.substring(0,2), to: m.substring(2,4), promotion: 'q' });
                        board.position(game.fen());
                        updateTable();
                        if (typeof SoundFX !== 'undefined') SoundFX.move();
                    }
                    $('#dojoFrog').text(res.message);
                    if (typeof setFrogMood !== 'undefined') setFrogMood('happy');
                },
                error: function() {
                    game.undo();
                    board.position(game.fen());
                    updateTable();
                    $('#dojoFrog').text("Connection error!");
                    if (typeof SoundFX !== 'undefined') SoundFX.error();
                    if (typeof setFrogMood !== 'undefined') setFrogMood('mad');
                }
            });
        },
        onSnapEnd: function() {
            board.position(game.fen());
        }
    });

    function loadList() {
        $('#openingButtons').empty();
        $.get('/get_openings', function(data) {
            data.forEach(function(op) {
                var btn = $(`<button class="magical-button">${op.name}</button>`);
                btn.click(function() { startDojo(op.key); });
                $('#openingButtons').append(btn);
            });
        });
    }
    loadList();

    function startDojo(key) {
        $.ajax({
            url: '/start_opening', type: 'POST', contentType: 'application/json',
            data: JSON.stringify({ opening: key }),
            success: function(res) {
                game.reset(); board.position('start'); updateTable();
                $('#dojoFrog').text(res.message);

                // SHOW PANEL
                $('#strategyPanel').show();
                $('#ideaList').empty();
                $('#tacticList').empty();

                // Show the "Cheat Sheet" moves
                $('#pgnDisplay').text(res.pgn || "Follow the frog's guidance...");

                // Handle Bold Markdown in Ideas/Tactics
                if(res.ideas) {
                    res.ideas.forEach(i => {
                        var formatted = i.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        $('#ideaList').append(`<li>${formatted}</li>`);
                    });
                }
                if(res.tactics) {
                    res.tactics.forEach(t => {
                        var formatted = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        $('#tacticList').append(`<li>${formatted}</li>`);
                    });
                }
            }
        });
    }

    $('#btnLearn').click(function() {
        var name = $('#newOpeningName').val();
        if(!name) { $('#dojoFrog').text("Please type a name!"); return; }
        $('#dojoFrog').text("Consulting the ancient scrolls...");

        $.ajax({
            url: '/add_opening', type: 'POST', contentType: 'application/json',
            data: JSON.stringify({ name: name }),
            success: function(res) {
                $('#dojoFrog').text(res.message);
                if(res.success) { loadList(); $('#newOpeningName').val(""); }
            }
        });
    });

    function updateTable() {
        $('#moveTable tbody').empty();
        var history = game.history();
        for (var i = 0; i < history.length; i += 2) {
            $('#moveTable tbody').append(`<tr><td>${(i/2)+1}.</td><td>${history[i]}</td><td>${history[i+1]||""}</td></tr>`);
        }
    }
});
</script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
